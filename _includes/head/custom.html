<!-- AEO: JSON-LD Structured Data -->
{% if page.layout == 'single' or page.layout == 'post' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ page.title | escape }}",
  "description": "{{ page.excerpt | strip_html | truncate: 160 | escape }}",
  "author": {
    "@type": "Person",
    "name": "{{ site.author.name }}",
    "url": "{{ site.url }}"
  },
  "publisher": {
    "@type": "Person",
    "name": "{{ site.author.name }}"
  },
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  },
  "inLanguage": "ko-KR"
  {% if page.categories %},
  "articleSection": "{{ page.categories | join: ', ' }}"
  {% endif %}
  {% if page.tags %},
  "keywords": "{{ page.tags | join: ', ' }}"
  {% endif %}
}
</script>
{% else %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ site.title }}",
  "description": "{{ site.description | escape }}",
  "url": "{{ site.url }}",
  "author": {
    "@type": "Person",
    "name": "{{ site.author.name }}"
  },
  "inLanguage": "ko-KR",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "{{ site.url }}/search/?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>
{% endif %}

<!-- Additional: Person schema for author -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ site.author.name }}",
  "url": "{{ site.url }}",
  "sameAs": [
    "https://github.com/{{ site.github_username }}"
  ],
  "jobTitle": "Developer",
  "knowsAbout": ["컴퓨터공학", "데이터엔지니어링", "인공지능", "백엔드개발"]
}
</script>

<!-- Mermaid diagram support -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

  // kramdown wraps code blocks as <pre><code class="language-mermaid">...</code></pre>
  // mermaid.run() expects <div class="mermaid">...</div>, so we transform first.
  document.addEventListener('DOMContentLoaded', () => {
    const codeBlocks = document.querySelectorAll('pre > code.language-mermaid');
    codeBlocks.forEach((codeBlock) => {
      const pre = codeBlock.parentElement;
      const div = document.createElement('div');
      div.className = 'mermaid';
      // Use innerText to preserve newlines but strip HTML
      div.textContent = codeBlock.innerText;
      pre.replaceWith(div);
    });

    mermaid.initialize({
      startOnLoad: true,
      theme: 'default',
      securityLevel: 'loose',
    });
    mermaid.run();
  });
</script>
