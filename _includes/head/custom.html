<!-- AEO: JSON-LD Structured Data -->
{% if page.layout == 'single' or page.layout == 'post' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ page.title | escape }}",
  "description": "{{ page.excerpt | strip_html | truncate: 160 | escape }}",
  "author": {
    "@type": "Person",
    "name": "{{ site.author.name }}",
    "url": "{{ site.url }}"
  },
  "publisher": {
    "@type": "Person",
    "name": "{{ site.author.name }}"
  },
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  },
  "inLanguage": "ko-KR"
  {% if page.categories %},
  "articleSection": "{{ page.categories | join: ', ' }}"
  {% endif %}
  {% if page.tags %},
  "keywords": "{{ page.tags | join: ', ' }}"
  {% endif %}
}
</script>
{% else %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ site.title }}",
  "description": "{{ site.description | escape }}",
  "url": "{{ site.url }}",
  "author": {
    "@type": "Person",
    "name": "{{ site.author.name }}"
  },
  "inLanguage": "ko-KR",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "{{ site.url }}/search/?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>
{% endif %}

<!-- Additional: Person schema for author -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ site.author.name }}",
  "url": "{{ site.url }}",
  "sameAs": [
    "https://github.com/{{ site.github_username }}"
  ],
  "jobTitle": "Developer",
  "knowsAbout": ["컴퓨터공학", "데이터엔지니어링", "인공지능", "백엔드개발"]
}
</script>

<!-- Mermaid diagram support (kramdown + Rouge compatible) -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  function transformMermaidBlocks() {
    /*
     * kramdown + Rouge wraps fenced code blocks like this:
     *
     *   <div class="language-mermaid highlighter-rouge">
     *     <div class="highlight">
     *       <pre class="highlight"><code>...diagram source...</code></pre>
     *     </div>
     *   </div>
     *
     * Mermaid expects the source to live inside <div class="mermaid">.
     * We replace each container in place.
     */
    const containers = document.querySelectorAll('div.language-mermaid');
    let count = 0;
    containers.forEach((container) => {
      const codeEl = container.querySelector('code');
      if (!codeEl) return;
      const source = codeEl.innerText;
      const target = document.createElement('div');
      target.className = 'mermaid';
      target.textContent = source;
      container.replaceWith(target);
      count += 1;
    });

    // Fallback: also handle <pre><code class="language-mermaid"> if any post happens to use it
    document.querySelectorAll('pre > code.language-mermaid').forEach((codeEl) => {
      const pre = codeEl.parentElement;
      const target = document.createElement('div');
      target.className = 'mermaid';
      target.textContent = codeEl.innerText;
      pre.replaceWith(target);
      count += 1;
    });

    if (window.console) {
      console.log('[mermaid] transformed', count, 'block(s)');
    }
    return count;
  }

  function init() {
    const transformed = transformMermaidBlocks();
    if (transformed === 0) return;

    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
      flowchart: { htmlLabels: true },
    });

    mermaid.run({ querySelector: '.mermaid' }).catch((err) => {
      if (window.console) {
        console.error('[mermaid] render error:', err);
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
